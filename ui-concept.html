<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autodungeon — UI Concept v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

:root {
  --bg:       #0a0912;
  --panel:    #14122a;
  --border:   #42387a;
  --border-hi:#7060c0;
  --gold:     #e0b84e;
  --gold-dim: #c09838;
  --red:      #e04040;
  --blue:     #4080d0;
  --purple:   #9050e0;
  --text:     #e8e4f0;
  --text-dim: #b0a8c8;
  --text-hi:  #ffffff;
}

html, body {
  height: 100%;
  background: #0a0912;
  background: var(--bg);
  color: #e8e4f0;
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  overflow: hidden;
  image-rendering: pixelated;
}

/* ── Layout ── */
.game {
  max-width: 1280px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px;
}

/* ── Pixel panel ── */
.panel {
  background: var(--panel);
  border: 2px solid var(--border);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,0.04),
    inset -2px -2px 0 rgba(0,0,0,0.4),
    3px 3px 0 #000;
  position: relative;
}

.panel-title {
  font-size: 7px;
  letter-spacing: 1px;
  color: var(--gold);
  padding: 6px 10px 5px;
  border-bottom: 2px solid var(--border);
  text-transform: uppercase;
}

/* Corner deco */
.panel::before, .panel::after {
  content: '';
  position: absolute;
  width: 6px; height: 6px;
  background: var(--border-hi);
}
.panel::before { top: -2px; left: -2px; }
.panel::after  { bottom: -2px; right: -2px; }

/* ── Arena ── */
.arena {
  flex: 0 0 38%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: #0e0c1c;
  border-color: var(--border);
}

/* Scanline CRT overlay */
.arena::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 10;
}

/* Floor glow */
.arena-glow {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 50px;
  background: radial-gradient(ellipse, rgba(120,40,220,0.45) 0%, transparent 70%);
  pointer-events: none;
}

/* Shadow under sprite */
.sprite-shadow {
  position: absolute;
  width: 72px; height: 10px;
  background: radial-gradient(ellipse, rgba(120,20,220,0.7) 0%, transparent 70%);
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}

/* Stage side runes */
.stage-left, .stage-right {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  font-size: 11px;
  color: rgba(110,70,200,0.22);
  user-select: none;
  z-index: 1;
}
.stage-left  { left: 12%; }
.stage-right { right: 12%; }

/* ── Pixel sprite ── */
.sprite-wrap {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.pixel-sprite {
  /* 1px base cell — actual pixels drawn via box-shadow in JS */
  width: 6px;
  height: 6px;
  image-rendering: pixelated;
  animation: float 2.8s ease-in-out infinite;
  position: relative;
}

.pixel-sprite.is-hit    { animation: spriteHit 0.32s steps(2, end) forwards; }
.pixel-sprite.is-attack { animation: spriteAttack 0.36s steps(3, end) forwards; }

.sprite-name {
  font-size: 9px;
  color: #ffffff;
  letter-spacing: 1px;
  text-shadow: 2px 2px 0 #000, 0 0 14px rgba(160,80,255,0.8);
  text-align: center;
}
.sprite-sub {
  font-size: 6px;
  color: var(--text);
  margin-top: 4px;
  text-align: center;
}

/* ── Bottom grid ── */
.bottom {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1.1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  min-height: 0;
}

.col-log {
  grid-row: 1 / 3;
  grid-column: 3;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* ── Pixel bars ── */
.bars { display: flex; flex-direction: column; gap: 8px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.bar-lbl {
  font-size: 6px;
  color: var(--text);
  width: 18px;
  flex-shrink: 0;
  letter-spacing: 0;
}

.bar-track {
  flex: 1;
  height: 10px;
  background: #100e22;
  border: 2px solid #302860;
  box-shadow: inset 1px 1px 0 rgba(0,0,0,0.6);
  overflow: hidden;
  position: relative;
  image-rendering: pixelated;
}

/* Pixel segments inside bar */
.bar-track::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 7px,
    rgba(0,0,0,0.25) 7px,
    rgba(0,0,0,0.25) 8px
  );
  pointer-events: none;
  z-index: 2;
}

.bar-fill {
  height: 100%;
  transition: width 0.4s steps(10);
  image-rendering: pixelated;
}

.bar-hp   { background: #c82828; box-shadow: inset 0 0 0 1px rgba(255,100,100,0.4); }
.bar-mp   { background: #2858b0; box-shadow: inset 0 0 0 1px rgba(100,160,255,0.4); }
.bar-xp   { background: #b07820; box-shadow: inset 0 0 0 1px rgba(220,180,60,0.4); }

.bar-val {
  font-size: 6px;
  color: var(--text);
  width: 58px;
  text-align: right;
  flex-shrink: 0;
  line-height: 1.2;
}

/* ── Player panel ── */
.player-inner { padding: 8px 10px 10px; }

.char-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 4px;
}

.char-name {
  font-size: 9px;
  color: var(--text-hi);
  text-shadow: 0 0 8px rgba(180,160,255,0.4);
  line-height: 1.4;
}

.char-level {
  font-size: 7px;
  color: var(--gold);
  white-space: nowrap;
}

.status-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.badge {
  font-size: 6px;
  padding: 3px 5px;
  border: 2px solid;
}
.badge-poison {
  color: #70c050;
  border-color: #305020;
  background: rgba(30,70,10,0.3);
  box-shadow: 2px 2px 0 #000;
}

/* ── Enemy panel ── */
.enemy-inner { padding: 8px 10px 10px; }

.enemy-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 4px;
}

.enemy-nm {
  font-size: 8px;
  color: var(--text-hi);
  line-height: 1.4;
}

.enemy-lv {
  font-size: 7px;
  color: var(--red);
  white-space: nowrap;
}

/* ── Controls panel (speed + pause) ── */
.controls-inner { padding: 8px 10px 10px; }

.controls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.ctrl-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--text-hi);
  background: #1e1c38;
  border: 2px solid var(--border);
  padding: 6px 8px;
  cursor: pointer;
  box-shadow: 2px 2px 0 #000;
  transition: none;
  letter-spacing: 0;
  position: relative;
  top: 0; left: 0;
}

.ctrl-btn:hover  { border-color: var(--border-hi); color: var(--text-hi); }
.ctrl-btn:active { top: 2px; left: 2px; box-shadow: none; }

.ctrl-btn.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: #f0e8d0;
  box-shadow: 2px 2px 0 #000;
}

.ctrl-btn.pause-btn {
  width: 100%;
  margin-bottom: 2px;
  text-align: center;
}

.ctrl-btn.pause-btn.active {
  background: #1a1030;
  border-color: var(--purple);
  color: #c090ff;
}

/* ── Zone panel ── */
.zone-inner { padding: 8px 10px 10px; }

.zone-btns {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: 6px;
}

.zone-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  color: var(--text);
  background: #1e1c38;
  border: 2px solid var(--border);
  padding: 6px 8px;
  cursor: pointer;
  box-shadow: 2px 2px 0 #000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative; top: 0; left: 0;
}

.zone-btn:hover:not(.locked)  { border-color: var(--border-hi); color: var(--text); }
.zone-btn:active:not(.locked) { top: 2px; left: 2px; box-shadow: none; }

.zone-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(100,70,20,0.15);
}

.zone-btn.locked {
  opacity: 0.45;
  cursor: not-allowed;
  color: var(--text-dim);
}

.zone-lock { color: var(--text); font-size: 5px; }

/* ── Combat log ── */
.log-inner {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 0;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: #40386a transparent;
}

.log-inner::-webkit-scrollbar       { width: 4px; }
.log-inner::-webkit-scrollbar-track { background: #100e20; }
.log-inner::-webkit-scrollbar-thumb { background: #40386a; }

.log-entry {
  font-size: 6.5px;
  line-height: 2;
  padding: 0 2px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  animation: logIn 0.15s steps(1) forwards;
}

.lhit   { color: #e0d8f0; }
.lcrit  { color: #f0d820; }
.lmiss  { color: #7868a0; }
.lloot  { color: #58d880; }
.ldeath { color: #e03838; }
.lregen { color: #40d898; }
.llevel { color: var(--gold); }
.lenemy { color: #d88898; }
.lzone  { color: #8898e0; }

/* ── Keyframes ── */
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-6px); }
}

@keyframes spriteHit {
  0%   { filter: brightness(3) sepia(1) hue-rotate(-30deg) saturate(4); transform: translateY(-6px) scale(0.94); }
  50%  { filter: brightness(2) sepia(1) hue-rotate(-30deg) saturate(3); transform: translateY(-4px) scale(0.96); }
  100% { filter: none; transform: translateY(-6px); }
}

@keyframes spriteAttack {
  0%   { transform: translateX(0px)  translateY(-6px); }
  40%  { transform: translateX(14px) translateY(-8px) scale(1.06); }
  100% { transform: translateX(0px)  translateY(-6px); }
}

@keyframes logIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Responsive */
@media (max-width: 860px) {
  .bottom {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    overflow-y: auto;
  }
  .col-log { grid-row: 3; grid-column: 1 / 3; min-height: 180px; }
  .arena   { flex: 0 0 26%; }
  html, body { overflow: auto; }
  .game { height: auto; min-height: 100vh; }
}
</style>
</head>
<body>
<div class="game">

  <!-- ══ Arena ══ -->
  <div class="arena panel">
    <div class="arena-glow"></div>
    <div class="sprite-shadow"></div>
    <div class="stage-left">✦</div>
    <div class="stage-right">✦</div>

    <div class="sprite-wrap">
      <div class="pixel-sprite" id="sprite"></div>
      <div>
        <div class="sprite-name">Shadow Wraith</div>
        <div class="sprite-sub">LV.18 ELITE</div>
      </div>
    </div>
  </div>

  <!-- ══ Bottom grid ══ -->
  <div class="bottom">

    <!-- Player stats -->
    <div class="panel">
      <div class="panel-title">Player</div>
      <div class="player-inner">
        <div class="char-header">
          <span class="char-name">Arcanis</span>
          <span class="char-level">LV.12</span>
        </div>
        <div class="bars">
          <div class="bar-row">
            <span class="bar-lbl">HP</span>
            <div class="bar-track"><div class="bar-fill bar-hp" id="php-bar" style="width:56.7%"></div></div>
            <span class="bar-val" id="php-val">68/120</span>
          </div>
          <div class="bar-row">
            <span class="bar-lbl">MP</span>
            <div class="bar-track"><div class="bar-fill bar-mp" style="width:50%"></div></div>
            <span class="bar-val">40/80</span>
          </div>
          <div class="bar-row">
            <span class="bar-lbl">XP</span>
            <div class="bar-track"><div class="bar-fill bar-xp" style="width:68%"></div></div>
            <span class="bar-val">3400/5000</span>
          </div>
        </div>
        <div class="status-row">
          <span class="badge badge-poison">☠ POISON</span>
        </div>
      </div>
    </div>

    <!-- Speed / pause controls -->
    <div class="panel">
      <div class="panel-title">Controls</div>
      <div class="controls-inner">
        <button class="ctrl-btn pause-btn" id="pause-btn" onclick="togglePause()">⏸ PAUSE</button>
        <div class="controls-row">
          <button class="ctrl-btn" onclick="setSpeed(0.5)" id="s05">0.5×</button>
          <button class="ctrl-btn active" onclick="setSpeed(1)"   id="s1" >1×</button>
          <button class="ctrl-btn" onclick="setSpeed(2)"   id="s2" >2×</button>
          <button class="ctrl-btn" onclick="setSpeed(4)"   id="s4" >4×</button>
        </div>
      </div>
    </div>

    <!-- Enemy stats -->
    <div class="panel">
      <div class="panel-title">Enemy</div>
      <div class="enemy-inner">
        <div class="enemy-head">
          <span class="enemy-nm">Shadow Wraith</span>
          <span class="enemy-lv">LV.18</span>
        </div>
        <div class="bars">
          <div class="bar-row">
            <span class="bar-lbl">HP</span>
            <div class="bar-track"><div class="bar-fill bar-hp" id="ehp-bar" style="width:22.5%"></div></div>
            <span class="bar-val" id="ehp-val">45/200</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Zone -->
    <div class="panel">
      <div class="panel-title">Zone</div>
      <div class="zone-inner">
        <div class="zone-btns">
          <button class="zone-btn" onclick="setZone(this)">🌲 FOREST</button>
          <button class="zone-btn active">💀 DUNGEON <span>FL.3</span></button>
          <button class="zone-btn locked">🌋 VOLCANO <span class="zone-lock">LV.12</span></button>
        </div>
      </div>
    </div>

    <!-- Combat log -->
    <div class="panel col-log">
      <div class="panel-title">Combat Log</div>
      <div class="log-inner" id="log"></div>
    </div>

  </div>
</div>

<script>
// ── Pixel sprite (12×13, 6px per pixel) ──────────────────────────────────────
const PX = 6;
const B = '#6030b8'; // body
const S = '#3d1a78'; // shadow/dark body
const D = '#150a30'; // eye socket dark
const E = '#ee66ff'; // eye glow
const _ = null;

const SPRITE = [
  [_,_,_,_,B,B,B,B,_,_,_,_],
  [_,_,_,B,B,B,B,B,B,_,_,_],
  [_,_,B,B,B,B,B,B,B,B,_,_],
  [_,B,B,B,B,B,B,B,B,B,B,_],
  [B,B,B,B,B,B,B,B,B,B,B,B],
  [B,B,S,S,B,B,B,B,S,S,B,B],
  [B,B,D,D,B,B,B,B,D,D,B,B],
  [B,B,E,E,B,B,B,B,E,E,B,B],
  [B,B,D,D,B,B,B,B,D,D,B,B],
  [B,B,B,B,B,B,B,B,B,B,B,B],
  [B,B,B,B,B,B,B,B,B,B,B,B],
  [B,B,B,B,B,B,B,B,B,B,B,B],
  [_,B,_,B,_,B,_,B,_,B,_,_],
];

function buildSprite(palette) {
  const shadows = [];
  const rows = SPRITE.length, cols = SPRITE[0].length;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const color = palette ? (palette[SPRITE[r][c]] ?? SPRITE[r][c]) : SPRITE[r][c];
      if (color) shadows.push(`${c * PX}px ${r * PX}px 0 0 ${color}`);
    }
  }
  return shadows.join(',');
}

const el = document.getElementById('sprite');
el.style.boxShadow = buildSprite(null);

// ── State ──────────────────────────────────────────────────────────────────────
let eHp = 45, eMax = 200, pHp = 68, pMax = 120;
let paused = false;

// ── Seed log ──────────────────────────────────────────────────────────────────
[
  ['lzone',  '> Dungeon of Echoes — Floor 3'],
  ['lenemy', '> Shadow Wraith appears!'],
  ['lhit',   '> You hit for 14 dmg  (159/200)'],
  ['lenemy', '> Wraith slashes you 22  (90/120)'],
  ['lcrit',  '> !! CRIT — 38 dmg dealt!'],
  ['lenemy', '> Wraith drains you 18  (72/120)'],
  ['lregen', '> +12 HP recovered  (68/120)'],
  ['lhit',   '> You hit for 11 dmg  (45/200)'],
].forEach(([c, m]) => addLog(c, m));

// ── Helpers ────────────────────────────────────────────────────────────────────
function addLog(cls, msg) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = `log-entry ${cls}`;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function anim(cls, ms) {
  const s = document.getElementById('sprite');
  s.classList.remove('is-hit','is-attack');
  void s.offsetWidth;
  s.classList.add(cls);
  setTimeout(() => s.classList.remove(cls), ms);
}

function setBar(id, val, max) {
  document.getElementById(id + '-bar').style.width = (Math.max(0,val)/max*100).toFixed(1)+'%';
  document.getElementById(id + '-val').textContent = `${Math.max(0,val)}/${max}`;
}

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// Simulate auto-combat loop
function combatTick() {
  if (paused) return;
  const dmg = rand(8,22), crit = Math.random()<0.18, final = crit?Math.floor(dmg*1.5):dmg;
  eHp -= final; anim('is-hit', 340);
  setBar('ehp', eHp, eMax);
  if (crit) addLog('lcrit', `> !! CRIT — ${final} dmg dealt!  (${Math.max(0,eHp)}/${eMax})`);
  else      addLog('lhit',  `> You hit for ${final} dmg  (${Math.max(0,eHp)}/${eMax})`);

  if (eHp <= 0) {
    addLog('ldeath', `> Shadow Wraith slain!`);
    setTimeout(() => addLog('lloot',  `> Loot: Void Cloak (Epic)`), 300);
    setTimeout(() => { eHp = eMax; setBar('ehp', eHp, eMax); addLog('lenemy','> New Shadow Wraith!'); }, 1200);
    return;
  }

  setTimeout(() => {
    if (paused) return;
    const ed = rand(8,18); pHp -= ed; anim('is-attack', 380);
    setBar('php', pHp, pMax);
    addLog('lenemy', `> Wraith hits you ${ed}  (${Math.max(0,pHp)}/${pMax})`);
  }, 700);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pause-btn');
  btn.textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
  btn.classList.toggle('active', paused);
}

function setSpeed(s) {
  ['s05','s1','s2','s4'].forEach(id => document.getElementById(id).classList.remove('active'));
  const map = {0.5:'s05',1:'s1',2:'s2',4:'s4'};
  document.getElementById(map[s]).classList.add('active');
}

function setZone(btn) {
  document.querySelectorAll('.zone-btn:not(.locked)').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Auto-combat demo every 2.2s
setInterval(combatTick, 2200);
</script>
</body>
</html>
