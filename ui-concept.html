<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autodungeon — UI Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d0c14;
  --panel:       #0f0e1c;
  --panel-b:     #0c0b18;
  --border:      #201c34;
  --border-hi:   #332d52;
  --gold:        #c9a84c;
  --gold-dim:    #6a5820;
  --gold-glow:   rgba(200,168,76,0.18);
  --purple:      #8844cc;
  --purple-dim:  #3d2060;
  --red:         #b03030;
  --blue:        #2a5888;
  --amber:       #b07020;
  --text:        #cec5b8;
  --text-bright: #ece4d4;
  --text-dim:    #6a6080;
  --text-faint:  #38304a;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 16px;
  overflow: hidden;
}

/* ── Game container ── */
.game {
  max-width: 1280px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px;
}

/* ── Panel base ── */
.panel {
  background: linear-gradient(160deg, var(--panel) 0%, var(--panel-b) 100%);
  border: 1px solid var(--border);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}

/* Subtle top-edge highlight */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,140,255,0.1), transparent);
  pointer-events: none;
}

.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 9.5px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold-dim);
  padding: 9px 14px 7px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-title::before {
  content: '';
  width: 3px; height: 3px;
  background: var(--gold-dim);
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Arena (top ~40%) ── */
.arena {
  flex: 0 0 38%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background:
    radial-gradient(ellipse 50% 90% at 50% 110%, #1c0d38 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 50%, #0e0c1e 0%, var(--bg) 100%);
  border-color: var(--border);
}

/* Grid overlay */
.arena::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(100,60,180,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,60,180,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* Floor radial glow */
.arena-floor {
  position: absolute;
  bottom: -20px; left: 50%;
  transform: translateX(-50%);
  width: 280px; height: 80px;
  background: radial-gradient(ellipse, rgba(110,40,200,0.22) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

/* Stage side decoration */
.stage-side {
  flex: 1;
  height: 100%;
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
}

.stage-side.left  { justify-content: flex-end;  padding-right: 32px; }
.stage-side.right { justify-content: flex-start; padding-left:  32px; }

.rune-mark {
  font-size: 64px;
  color: rgba(100,50,180,0.07);
  user-select: none;
  line-height: 1;
}

/* ── Enemy avatar ── */
.avatar-wrap {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.avatar-ring {
  width: 128px; height: 128px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #281840, #0c0918);
  border: 2px solid #362855;
  box-shadow:
    0 0 0 1px rgba(80,40,140,0.3),
    0 0 35px rgba(110,40,200,0.22),
    0 0 70px rgba(80,20,160,0.1),
    inset 0 0 30px rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: breathe 3.8s ease-in-out infinite;
  position: relative;
}

/* Hit flash overlay */
.avatar-ring::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,30,30,0.75) 0%, rgba(200,0,0,0.2) 50%, transparent 70%);
  opacity: 0;
  pointer-events: none;
}

.avatar-ring.is-hit {
  animation: enemyHit 0.38s ease-out forwards;
}
.avatar-ring.is-hit::after {
  animation: hitFlash 0.38s ease-out forwards;
}
.avatar-ring.is-attack {
  animation: enemyAttack 0.42s ease-out forwards;
}

/* Wraith SVG */
.wraith-svg {
  width: 74px; height: 82px;
  filter: drop-shadow(0 0 10px rgba(170,60,255,0.5));
}

/* Enemy info below avatar */
.avatar-label {
  text-align: center;
}

.avatar-name {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-bright);
  text-shadow: 0 0 24px rgba(160,80,255,0.45);
  letter-spacing: 0.5px;
}

.avatar-sub {
  font-size: 12.5px;
  color: var(--text-dim);
  margin-top: 2px;
  font-style: italic;
}

/* ── Bottom 3-col grid ── */
.bottom {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1.1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  min-height: 0;
}

.col-log {
  grid-row: 1 / 3;
  grid-column: 3;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* ── Bar system ── */
.bars { display: flex; flex-direction: column; gap: 9px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 9px;
}

.bar-lbl {
  font-family: 'Cinzel', serif;
  font-size: 9.5px;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  width: 22px;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 13px;
  background: #07070f;
  border-radius: 3px;
  border: 1px solid #181428;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.95);
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
}

/* Gloss sheen */
.bar-fill::after {
  content: '';
  position: absolute;
  top: 1px; left: 2px; right: 2px;
  height: 4px;
  background: rgba(255,255,255,0.11);
  border-radius: 2px;
}

.bar-hp  { background: linear-gradient(90deg, #601010, #b02828, #cc3232); }
.bar-mp  { background: linear-gradient(90deg, #102040, #245888, #2870a8); }
.bar-xp  { background: linear-gradient(90deg, #442008, #946018, #b87820); }

.bar-val {
  font-size: 11.5px;
  color: var(--text-dim);
  width: 62px;
  text-align: right;
  flex-shrink: 0;
}

/* ── Player panel ── */
.player-inner { padding: 10px 14px 13px; }

.char-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 11px;
}

.char-name {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-bright);
}

.char-level {
  font-family: 'Cinzel', serif;
  font-size: 11.5px;
  color: var(--gold);
}

.status-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.badge {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 2px;
  border: 1px solid;
}
.badge-poison { color: #7ec85a; border-color: #3a6024; background: rgba(40,90,20,0.2); }

/* ── Enemy stat panel ── */
.enemy-inner { padding: 10px 14px 13px; }

.enemy-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 11px;
}

.enemy-nm {
  font-family: 'Cinzel', serif;
  font-size: 14.5px;
  font-weight: 600;
  color: #e0c8d8;
}

.enemy-lv {
  font-family: 'Cinzel', serif;
  font-size: 11.5px;
  color: #cc3c3c;
}

/* ── Zone panel ── */
.zone-inner { padding: 10px 14px 13px; display: flex; flex-direction: column; gap: 9px; }

.zone-name {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
}

.zone-meta {
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.zone-sep { color: var(--text-faint); margin: 0 4px; }

.encounter-track {
  display: flex;
  align-items: center;
  gap: 8px;
}

.encounter-track .label {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text-dim);
  white-space: nowrap;
}

.pips { display: flex; gap: 4px; }

.pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #0e0c18;
  border: 1px solid #2a2440;
  flex-shrink: 0;
}
.pip.done   { background: var(--gold-dim); border-color: #8a6828; }
.pip.active { background: var(--gold); border-color: #e0c060; box-shadow: 0 0 6px rgba(200,168,76,0.7); }

/* ── Actions panel ── */
.actions-inner { padding: 10px 14px 13px; }

.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}

.action-btn {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text);
  background: linear-gradient(155deg, #191728, #111020);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 9px 8px;
  cursor: pointer;
  transition: border-color .15s, color .15s, box-shadow .15s, transform .08s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 2px 6px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}

.action-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 70%);
  pointer-events: none;
}

.action-btn:hover { transform: translateY(-1px); }
.action-btn:active { transform: scale(0.97) translateY(0); }

.btn-attack:hover { border-color: #7a2020; color: #cc4444; box-shadow: 0 0 14px rgba(160,30,30,0.25), inset 0 1px 0 rgba(255,255,255,0.04); }
.btn-magic:hover  { border-color: #5030a0; color: #aa66ee; box-shadow: 0 0 14px rgba(100,50,200,0.25), inset 0 1px 0 rgba(255,255,255,0.04); }
.btn-item:hover   { border-color: var(--gold-dim); color: var(--gold); box-shadow: 0 0 14px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.04); }
.btn-flee:hover   { border-color: #2a3a50; color: #6080aa; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }

/* ── Combat log ── */
.log-inner {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: #241e38 transparent;
}

.log-inner::-webkit-scrollbar       { width: 3px; }
.log-inner::-webkit-scrollbar-track { background: transparent; }
.log-inner::-webkit-scrollbar-thumb { background: #241e38; border-radius: 2px; }

.log-entry {
  font-size: 13px;
  line-height: 1.55;
  padding: 3px 4px;
  border-radius: 3px;
  animation: fadeSlideIn 0.28s ease-out;
}

.log-entry b { font-weight: 600; }

.lhit    { color: #c0b8cc; }
.lcrit   { color: #e0c030; }
.lmiss   { color: #50486a; font-style: italic; }
.lloot   { color: #58c478; }
.ldeath  { color: #cc3030; }
.lregen  { color: #44b888; }
.llevel  { color: var(--gold); }
.lenemy  { color: #c07888; }
.lzone   { color: #7890c8; font-style: italic; }

/* ── Keyframes ── */
@keyframes breathe {
  0%, 100% { transform: scale(1.000); box-shadow: 0 0 0 1px rgba(80,40,140,0.3), 0 0 35px rgba(110,40,200,0.22), 0 0 70px rgba(80,20,160,0.10), inset 0 0 30px rgba(0,0,0,0.9); }
  50%       { transform: scale(1.032); box-shadow: 0 0 0 1px rgba(80,40,140,0.4), 0 0 45px rgba(110,40,200,0.32), 0 0 90px rgba(80,20,160,0.16), inset 0 0 30px rgba(0,0,0,0.9); }
}

@keyframes enemyHit {
  0%   { transform: scale(1.00); box-shadow: 0 0 60px rgba(255,20,20,0.90), inset 0 0 35px rgba(200,0,0,0.35); }
  25%  { transform: scale(0.95); box-shadow: 0 0 80px rgba(255,20,20,0.75), inset 0 0 45px rgba(200,0,0,0.45); }
  100% { transform: scale(1.00); box-shadow: 0 0 0 1px rgba(80,40,140,0.3), 0 0 35px rgba(110,40,200,0.22), inset 0 0 30px rgba(0,0,0,0.9); }
}

@keyframes hitFlash {
  0%   { opacity: 1.0; }
  100% { opacity: 0.0; }
}

@keyframes enemyAttack {
  0%   { transform: scale(1.00) translateX(0px); }
  30%  { transform: scale(1.06) translateX(20px); }
  100% { transform: scale(1.00) translateX(0px); }
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ── */
@media (max-width: 860px) {
  .bottom {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
  }
  .col-log { grid-row: 3; grid-column: 1 / 3; min-height: 160px; }
  .arena   { flex: 0 0 28%; }
  html, body { overflow: auto; }
  .game { height: auto; min-height: 100vh; }
}
</style>
</head>
<body>
<div class="game">

  <!-- ══ Arena ══ -->
  <div class="arena panel">
    <div class="arena-floor"></div>

    <div class="stage-side left">
      <span class="rune-mark">⚔</span>
    </div>

    <div class="avatar-wrap">
      <div class="avatar-ring" id="avatar">
        <!-- Wraith SVG -->
        <svg class="wraith-svg" viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg">
          <!-- Shadow pool -->
          <ellipse cx="50" cy="106" rx="30" ry="6" fill="#5010a0" opacity="0.22"/>
          <!-- Cloak body -->
          <path d="M 22 46 L 16 96 Q 30 82 40 96 Q 50 80 60 96 Q 70 82 84 96 L 78 46 Q 64 27 50 25 Q 36 27 22 46 Z" fill="#160e28"/>
          <!-- Hood -->
          <path d="M 24 47 Q 20 16 50 7 Q 80 16 76 47 Q 62 35 50 37 Q 38 35 24 47 Z" fill="#100a20"/>
          <!-- Face void -->
          <ellipse cx="50" cy="45" rx="19" ry="17" fill="#060410"/>
          <!-- Eyes -->
          <ellipse cx="41" cy="43" rx="5.5" ry="4.5" fill="#6e10b8"/>
          <ellipse cx="41" cy="43" rx="2.5" ry="2"   fill="#d055ff"/>
          <ellipse cx="59" cy="43" rx="5.5" ry="4.5" fill="#6e10b8"/>
          <ellipse cx="59" cy="43" rx="2.5" ry="2"   fill="#d055ff"/>
          <!-- Eye inner glow -->
          <circle cx="41" cy="42.5" r="1"   fill="#f0aaff" opacity="0.7"/>
          <circle cx="59" cy="42.5" r="1"   fill="#f0aaff" opacity="0.7"/>
          <!-- Wispy robe bottom -->
          <path d="M 16 94 Q 27 78 38 92 Q 44 74 50 90 Q 56 74 62 92 Q 73 78 84 94"
                fill="none" stroke="#160e28" stroke-width="11" stroke-linecap="round"/>
          <!-- Side wisps / claws -->
          <path d="M 22 58 Q 5 52 3 67 Q 12 62 20 66" fill="#160e28"/>
          <path d="M 78 58 Q 95 52 97 67 Q 88 62 80 66" fill="#160e28"/>
          <!-- Subtle cloak sheen -->
          <path d="M 36 30 Q 38 50 34 72" stroke="rgba(120,70,220,0.08)" stroke-width="4" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="avatar-label">
        <div class="avatar-name">Shadow Wraith</div>
        <div class="avatar-sub">⚡ Level 18 Elite</div>
      </div>
    </div>

    <div class="stage-side right">
      <span class="rune-mark">✦</span>
    </div>
  </div>

  <!-- ══ Bottom grid ══ -->
  <div class="bottom">

    <!-- ── Player stats ── -->
    <div class="panel">
      <div class="panel-title">Adventurer</div>
      <div class="player-inner">
        <div class="char-header">
          <span class="char-name">Arcanis</span>
          <span class="char-level">Level 12</span>
        </div>
        <div class="bars">
          <div class="bar-row">
            <span class="bar-lbl">HP</span>
            <div class="bar-track">
              <div class="bar-fill bar-hp" id="player-hp-bar" style="width:56.7%"></div>
            </div>
            <span class="bar-val" id="player-hp-val">68 / 120</span>
          </div>
          <div class="bar-row">
            <span class="bar-lbl">MP</span>
            <div class="bar-track">
              <div class="bar-fill bar-mp" style="width:50%"></div>
            </div>
            <span class="bar-val">40 / 80</span>
          </div>
          <div class="bar-row">
            <span class="bar-lbl">XP</span>
            <div class="bar-track">
              <div class="bar-fill bar-xp" style="width:68%"></div>
            </div>
            <span class="bar-val">3,400 / 5,000</span>
          </div>
        </div>
        <div class="status-row">
          <span class="badge badge-poison">☠ Poisoned</span>
        </div>
      </div>
    </div>

    <!-- ── Actions ── -->
    <div class="panel">
      <div class="panel-title">Actions</div>
      <div class="actions-inner">
        <div class="action-grid">
          <button class="action-btn btn-attack" onclick="doAttack()">⚔&nbsp; Attack</button>
          <button class="action-btn btn-magic"  onclick="doMagic()">✦&nbsp; Magic</button>
          <button class="action-btn btn-item"   onclick="doItem()">⚗&nbsp; Item</button>
          <button class="action-btn btn-flee"   onclick="doFlee()">↩&nbsp; Flee</button>
        </div>
      </div>
    </div>

    <!-- ── Enemy stats ── -->
    <div class="panel">
      <div class="panel-title">Enemy</div>
      <div class="enemy-inner">
        <div class="enemy-head">
          <span class="enemy-nm">Shadow Wraith</span>
          <span class="enemy-lv">Lv. 18</span>
        </div>
        <div class="bars">
          <div class="bar-row">
            <span class="bar-lbl">HP</span>
            <div class="bar-track">
              <div class="bar-fill bar-hp" id="enemy-hp-bar" style="width:22.5%"></div>
            </div>
            <span class="bar-val" id="enemy-hp-val">45 / 200</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Zone ── -->
    <div class="panel">
      <div class="panel-title">Zone</div>
      <div class="zone-inner">
        <div class="zone-name">Dungeon of Echoes</div>
        <div class="zone-meta">
          <span>Floor 3<span class="zone-sep">·</span>Encounter 4 / 10</span>
        </div>
        <div class="encounter-track">
          <span class="label">Progress</span>
          <div class="pips">
            <div class="pip done"></div>
            <div class="pip done"></div>
            <div class="pip done"></div>
            <div class="pip active"></div>
            <div class="pip"></div><div class="pip"></div>
            <div class="pip"></div><div class="pip"></div>
            <div class="pip"></div><div class="pip"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Combat log ── -->
    <div class="panel col-log">
      <div class="panel-title">Combat Log</div>
      <div class="log-inner" id="log"></div>
    </div>

  </div>
</div>

<script>
  // ── Demo state ──
  let eHp = 45, eHpMax = 200;
  let pHp = 68, pHpMax = 120;

  // ── Initial log ──
  const seed = [
    ['lzone',  'You descend into the Dungeon of Echoes — Floor 3.'],
    ['lenemy', 'A Shadow Wraith materialises from the darkness.'],
    ['lhit',   'You strike Shadow Wraith for <b>14</b> damage.  (159/200)'],
    ['lenemy', 'Shadow Wraith claws you for <b>22</b> damage.  (90/120)'],
    ['lcrit',  '⚡ Critical hit! You deal <b>38</b> damage to Shadow Wraith!'],
    ['lenemy', 'Shadow Wraith drains your life for <b>18</b> damage.  (72/120)'],
    ['lregen', '💚 You recovered 12 HP after the kill.  (68/120)'],
    ['lhit',   'You strike Shadow Wraith for <b>11</b> damage.  (45/200)'],
  ];

  // ── Helpers ──
  function addLog(cls, html) {
    const el = Object.assign(document.createElement('div'), { className: `log-entry ${cls}`, innerHTML: html });
    const log = document.getElementById('log');
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  function triggerAnim(id, cls, ms) {
    const el = document.getElementById(id);
    el.classList.remove('is-hit', 'is-attack');
    void el.offsetWidth;
    el.classList.add(cls);
    setTimeout(() => { el.classList.remove(cls); }, ms);
  }

  function setEnemyHp(v) {
    eHp = Math.max(0, v);
    const pct = (eHp / eHpMax * 100).toFixed(1);
    document.getElementById('enemy-hp-bar').style.width = pct + '%';
    document.getElementById('enemy-hp-val').textContent = `${eHp} / ${eHpMax}`;
  }

  function setPlayerHp(v) {
    pHp = Math.max(0, Math.min(pHpMax, v));
    const pct = (pHp / pHpMax * 100).toFixed(1);
    document.getElementById('player-hp-bar').style.width = pct + '%';
    document.getElementById('player-hp-val').textContent = `${pHp} / ${pHpMax}`;
  }

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  // ── Actions ──
  function doAttack() {
    const dmg = rand(8, 22);
    const crit = Math.random() < 0.2;
    const final = crit ? Math.floor(dmg * 1.5) : dmg;
    setEnemyHp(eHp - final);
    triggerAnim('avatar', 'is-hit', 400);

    if (crit) addLog('lcrit', `⚡ Critical hit! You deal <b>${final}</b> damage to Shadow Wraith!  (${eHp}/${eHpMax})`);
    else      addLog('lhit',  `You strike Shadow Wraith for <b>${final}</b> damage.  (${eHp}/${eHpMax})`);

    if (eHp <= 0) { killEnemy(); return; }

    setTimeout(() => {
      const edm = rand(8, 18);
      setPlayerHp(pHp - edm);
      triggerAnim('avatar', 'is-attack', 450);
      addLog('lenemy', `Shadow Wraith retaliates for <b>${edm}</b> damage.  (${pHp}/${pHpMax})`);
    }, 650);
  }

  function doMagic() {
    const dmg = rand(24, 42);
    setEnemyHp(eHp - dmg);
    triggerAnim('avatar', 'is-hit', 400);
    addLog('lcrit', `✦ Arcane Bolt strikes Shadow Wraith for <b>${dmg}</b> magic damage!  (${eHp}/${eHpMax})`);
    if (eHp <= 0) { killEnemy(); return; }
    setTimeout(() => {
      const edm = rand(10, 20);
      setPlayerHp(pHp - edm);
      triggerAnim('avatar', 'is-attack', 450);
      addLog('lenemy', `Shadow Wraith counters for <b>${edm}</b> damage.  (${pHp}/${pHpMax})`);
    }, 650);
  }

  function doItem() {
    const heal = rand(28, 45);
    setPlayerHp(pHp + heal);
    addLog('lregen', `⚗ Health Potion consumed — restored <b>${heal}</b> HP.  (${pHp}/${pHpMax})`);
  }

  function doFlee() {
    addLog('lmiss', 'You attempt to flee… Shadow Wraith bars your path!');
    setTimeout(() => {
      const edm = rand(12, 22);
      setPlayerHp(pHp - edm);
      triggerAnim('avatar', 'is-attack', 450);
      addLog('lenemy', `Shadow Wraith punishes your cowardice for <b>${edm}</b> damage.  (${pHp}/${pHpMax})`);
    }, 420);
  }

  function killEnemy() {
    addLog('ldeath', '💀 Shadow Wraith has been slain!');
    setTimeout(() => addLog('lloot', '🎁 Loot: <b>Voidweave Shroud</b> (Legendary)'), 300);
    setTimeout(() => addLog('llevel','⭐ Level up! You are now <b>Level 13</b>!'), 700);
    setTimeout(() => {
      eHp = eHpMax;
      setEnemyHp(eHp);
      addLog('lzone', 'A new Shadow Wraith emerges from the darkness…');
    }, 1400);
  }

  // ── Seed initial log ──
  seed.forEach(([cls, msg]) => addLog(cls, msg));
</script>
</body>
</html>
